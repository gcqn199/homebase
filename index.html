<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Homebase Passdown</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Homebase">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="theme-color" content="#d94f04">
<style>
html { -webkit-text-size-adjust: 100%; }
body { margin: 0; background: #cfd6dd; }

.app {
  font-family: Tahoma, "Segoe UI", Verdana, sans-serif;
  font-size: 11px;
  color: #1b1b1b;
  background: #cfd6dd;
  min-height: 100vh;
  padding-bottom: calc(40px + env(safe-area-inset-bottom));
}
.app a { color: #0b3d91; text-decoration: underline; cursor: pointer; }
.app b { font-weight: 700; }
.app input, .app select, .app textarea, .app button { font-family: inherit; }

/* chrome */
.chrome {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  background: linear-gradient(#f4600c, #d94f04);
  color: #fff;
  padding: 6px 12px;
  padding-top: calc(6px + env(safe-area-inset-top));
  border-bottom: 2px solid #a33a00;
  position: sticky; top: 0; z-index: 30;
}
.chromeBrand { font-weight: 800; letter-spacing: 2px; font-size: 14px; }
.chromeNav { display: flex; gap: 14px; }
.chromeNav span { cursor: pointer; padding: 2px 4px; }
.chromeNav span.on, .chromeNav span:hover { background: rgba(255,255,255,.22); border-radius: 2px; }
.chromeRight { margin-left: auto; font-size: 10px; display: flex; align-items: center; gap: 8px; }
.chromeRight u { cursor: pointer; }
.syncChip { display: inline-flex; align-items: center; gap: 5px; background: rgba(0,0,0,.18); padding: 2px 8px; border-radius: 10px; cursor: pointer; }
.syncDot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; box-shadow: 0 0 3px rgba(0,0,0,.4); }
.gearTop { cursor: pointer; font-size: 15px; padding: 0 4px; }

.toast {
  position: fixed; top: calc(44px + env(safe-area-inset-top)); right: 14px; z-index: 60;
  background: #fffbd6; border: 1px solid #c9a227; padding: 6px 12px;
  box-shadow: 2px 2px 6px rgba(0,0,0,.3); font-size: 11px; max-width: 78vw;
}

.page { padding: 8px 10px; }
.ownerLine { background: #eef1f4; border: 1px solid #b8c0c8; padding: 4px 8px; margin-bottom: 6px; }

.controls { display: flex; align-items: center; gap: 14px; margin: 6px 0; flex-wrap: wrap; }
.chk { display: flex; align-items: center; gap: 4px; cursor: pointer; }
.btnGrad {
  font-size: 11px; cursor: pointer;
  background: linear-gradient(#7fa8d9, #4f7fbf);
  color: #fff; border: 1px solid #2f5a94; border-radius: 3px;
  padding: 3px 12px; text-shadow: 0 1px 1px rgba(0,0,0,.3);
}
.btnGrad:hover { background: linear-gradient(#8fb4e2, #5b8bcc); }
.btnDanger {
  font-size: 11px; cursor: pointer; margin-left: auto;
  background: linear-gradient(#d97a6a, #c0392b); color: #fff;
  border: 1px solid #8f2417; border-radius: 3px; padding: 3px 12px;
}
.bulkBar { background: #fff8e0; border: 1px solid #d8c26a; padding: 3px 8px; display: flex; align-items: center; gap: 6px; }

.createForm { background: #f4f7fa; border: 1px solid #9fb0c0; padding: 8px; margin-bottom: 8px; }
.quickAdd { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin: 4px 0 2px; }
.qaLabel { font-weight: 700; font-size: 11px; color: #35506e; margin-right: 2px; }
.qaBtn {
  font-size: 11px; cursor: pointer; font-family: inherit;
  background: linear-gradient(#eef3f8, #d7e2ee);
  color: #24405e; border: 1px solid #8fa4bb; border-radius: 3px; padding: 2px 8px;
}
.qaBtn:hover { background: linear-gradient(#fff, #e6eef7); }
.dlDate { margin-top: 3px; }
.createGrid { display: flex; gap: 12px; flex-wrap: wrap; margin: 6px 0 8px; }
.createGrid label { display: flex; flex-direction: column; gap: 2px; font-weight: 600; }
.createGrid label.wide { flex: 1; min-width: 260px; }
.createGrid input, .createGrid select, .bulkBar select {
  font-size: 16px; padding: 3px 4px; border: 1px solid #8a99a8;
}

.sectionTitle { font-weight: 700; margin: 4px 0 2px; }

/* tables */
.tableWrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 14px; }
.grid { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #8a99a8; min-width: 880px; }
.grid th {
  background: linear-gradient(#6b7c8d, #46586a);
  color: #fff; font-size: 10px; text-align: left;
  padding: 3px 6px; border-right: 1px solid #37475a; white-space: nowrap;
}
.thSearch { min-width: 210px; }
.thSearch .mag { font-size: 13px; margin-right: 4px; }
.searchBox { font-size: 16px; padding: 1px 4px; border: 1px solid #333; width: 120px; }
.grid td { padding: 3px 6px; border-right: 1px solid #dde3e9; border-bottom: 1px solid #e6ebf0; vertical-align: top; }
.row { background: #fff; }
.rowAlt { background: #f2f6fa; }
.row:hover, .rowAlt:hover { background: #fdf3d7; }
.row.dragSrc, .rowAlt.dragSrc { opacity: .4; }
.row.dragOver, .rowAlt.dragOver { outline: 2px dashed #4f7fbf; outline-offset: -2px; background: #eaf1fa; }

/* priority bands */
.band td { font-weight: 700; color: #fff; padding: 4px 8px; cursor: pointer; text-shadow: 0 1px 1px rgba(0,0,0,.4); font-size: 11px; }
.band1 td { background: repeating-linear-gradient(115deg, #c22f1e, #c22f1e 14px, #d84a2e 14px, #d84a2e 28px); }
.band2 td { background: repeating-linear-gradient(115deg, #d97a12, #d97a12 14px, #e8912b 14px, #e8912b 28px); }
.band3 td { background: repeating-linear-gradient(115deg, #d3ac0f, #d3ac0f 14px, #e2be2a 14px, #e2be2a 28px); }
.band4 td { background: repeating-linear-gradient(115deg, #1f7ba8, #1f7ba8 14px, #2f8fbf 14px, #2f8fbf 28px); }
.band5 td { background: repeating-linear-gradient(115deg, #6d3d91, #6d3d91 14px, #7f4fa6 14px, #7f4fa6 28px); }
.bandToggle { display: inline-block; width: 12px; text-align: center; background: rgba(255,255,255,.25); margin-right: 4px; }
.bandCount { font-weight: 400; opacity: .85; }

.entityCell { min-width: 210px; }
.entityTop { display: flex; align-items: center; gap: 5px; }
.dragHandle { cursor: grab; color: #8a99a8; font-size: 12px; }
.dragHandle:active { cursor: grabbing; }
.rank { display: inline-block; min-width: 14px; text-align: right; color: #555; }
.woLink { font-weight: 600; }
.entitySub { display: flex; align-items: center; gap: 10px; padding-left: 34px; margin-top: 1px; }
.statusCell { display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; }
.stIcon { font-size: 10px; }
.stOpen { color: #1c7a2d; }
.stProg { color: #1f7ba8; }
.stHold { color: #d69a00; }
.stClosed { color: #666; }

.flowCell a { font-weight: 600; }
.descCell { cursor: pointer; min-width: 180px; }
.commentCell { min-width: 200px; color: #222; }
.addVal { color: #0b3d91; }
.chkState { color: #555; font-size: 10px; }
.updTime { color: #444; }

/* PM sections */
.pmHeader {
  background: linear-gradient(#d7dde3, #b9c2cb);
  border: 1px solid #8a99a8; border-bottom: none;
  padding: 5px 8px; display: flex; align-items: center;
  letter-spacing: 1px; font-weight: 700; color: #24313f;
}
.pmHeaderTitle { font-size: 11px; }
.toTop { margin-left: auto; font-size: 10px; white-space: nowrap; }
.pmSub { background: #eef1f4; border: 1px solid #8a99a8; border-bottom: none; padding: 4px 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.pmGrid th.thHi { background: linear-gradient(#4f7fbf, #2f5a94); }
.numCell { text-align: right; white-space: nowrap; }
.hiCol { background: #eaf1fa; }
.neg { color: #c0271a; font-weight: 700; }

.pmBadge { display: inline-block; width: 108px; text-align: center; padding: 3px 0; font-weight: 700; font-size: 10px; }
.pmOpp { background: #1c5c34; color: #fff; }
.pmDue { background: #e8b90c; color: #4a3a00; }
.pmOver { background: #c0271a; color: #fff; }

.gearCell { position: relative; text-align: center; }
.gear { cursor: pointer; font-size: 16px; color: #46586a; padding: 2px 6px; display: inline-block; }
.gear:hover { color: #1f7ba8; }
.gearMenu {
  position: absolute; left: 30px; top: 0; z-index: 40; min-width: 190px;
  background: #fff; border: 1px solid #8a99a8; box-shadow: 3px 3px 6px rgba(0,0,0,.3); text-align: left;
}
.gearMenu div { padding: 7px 10px; cursor: pointer; }
.gearMenu div:hover { background: #dce8f5; }

/* inline tap-to-edit fields */
.ieText { cursor: pointer; border-bottom: 1px dashed #b9c4cf; }
.ieText:hover, .ieText:active { background: #fdf3c8; border-bottom-color: #4a7ab5; }
.ieEmpty { color: #0b3d91; }
.ieInput { font-size: 11px; border: 1px solid #4a7ab5; background: #fffef2; padding: 2px 3px; box-sizing: border-box; width: 100%; min-width: 70px; }
.ieInput.ieNum { width: 68px; min-width: 0; text-align: right; }
input.ieInput[type="date"] { width: auto; min-width: 0; }
.numCell .ieText { border-bottom-style: dotted; }

/* parts table */
.partActs { white-space: nowrap; }
.partActs .btnSm + .btnSm { margin-left: 4px; }
.partBadge { display: inline-block; width: 88px; text-align: center; padding: 2px 0; font-weight: 700; font-size: 10px; border: 1px solid rgba(0,0,0,.15); }
.pb0 { background: #e6e9ec; color: #444; }
.pb1 { background: #dce8f5; color: #1f4f86; }
.pb2 { background: #fdeec8; color: #8a5b00; }
.pb3 { background: #ddefdd; color: #1c5c34; }
.pb4 { background: #35424f; color: #fff; }
.partDone td { color: #999; }
.btnSm { padding: 2px 8px; font-size: 10px; }

/* daily checklist */
.daily { background: #fff; border: 1px solid #8a99a8; padding: 8px; margin-bottom: 14px; }
.daily pre { font-family: inherit; margin: 0 0 8px; white-space: pre-wrap; }
.daily textarea { width: 100%; font-size: 16px; box-sizing: border-box; margin-bottom: 8px; }
.dailyBtns { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.dailyMeta { margin-left: auto; color: #333; }

/* detail view */
.crumbLine { margin-bottom: 6px; }
.detailTabs { display: flex; gap: 2px; border-bottom: 2px solid #d94f04; overflow-x: auto; }
.detailTabs span {
  padding: 5px 14px; cursor: pointer; background: #e8e3dc; border: 1px solid #b8b0a4; border-bottom: none;
  border-radius: 3px 3px 0 0; font-weight: 600; white-space: nowrap;
}
.detailTabs span.dtOn { background: #fff; color: #d94f04; }

.ribbon {
  display: flex; gap: 2px; flex-wrap: wrap;
  background: linear-gradient(#f7f9fb, #dfe6ec);
  border: 1px solid #b8c0c8; border-top: none; padding: 6px; margin-bottom: 8px;
}
.ribBtn {
  width: 80px; text-align: center; padding: 6px 2px; cursor: pointer; border: 1px solid transparent; border-radius: 3px;
}
.ribBtn:hover { border-color: #f0c987; background: #fdf3d7; }
.ribIc { font-size: 17px; }
.ribLb { font-size: 9px; margin-top: 2px; line-height: 1.15; }

.statusPicker { background: #fff8e0; border: 1px solid #d8c26a; padding: 6px 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.statusPicker select { font-size: 16px; }
.partInput { flex: 1; min-width: 180px; font-size: 16px; padding: 3px 4px; border: 1px solid #8a99a8; }
.partQty { width: 52px; font-size: 16px; padding: 3px 4px; border: 1px solid #8a99a8; }
.partSrc { width: 190px; font-size: 16px; padding: 3px 4px; border: 1px solid #8a99a8; }

.downtime { background: #dfe9df; border: 1px solid #9db89d; padding: 10px 12px; margin-bottom: 10px; }
.dtQ { margin-bottom: 8px; }
.dtBtns { display: flex; gap: 8px; flex-wrap: wrap; }
.dtBtns button { font-size: 11px; padding: 6px 10px; cursor: pointer; border: 1px solid #8a99a8; background: #f4f6f8; border-radius: 2px; }
.dtYes { color: #1c7a2d; font-weight: 700; }
.dtNoReq { color: #c0271a; }

.fyiBar { background: #eef4ee; border: 1px solid #b7cbb7; padding: 6px 10px; margin-bottom: 8px; }
.fyiTag { background: #2f5a94; color: #fff; font-weight: 700; padding: 1px 6px; margin-right: 8px; border-radius: 2px; }
.fyiMeta { color: #444; }

.edTitle { color: #a33a00; font-weight: 700; margin: 10px 0 4px; }
.edBlock { background: #fff; border: 1px solid #c8d0d8; padding: 8px 12px; }
.edTool { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.kvTable td { padding: 2px 6px 2px 0; vertical-align: top; }
.kvTable td:first-child { font-weight: 700; white-space: nowrap; width: 140px; }

.ctRow { padding: 2px 0; }
.gpHead { font-weight: 700; text-decoration: underline; }
.gpItem { padding: 4px 0; }
.gpItem.dragSrc { opacity: .4; }
.gpItem.dragOver { outline: 2px dashed #4f7fbf; outline-offset: -2px; background: #eaf1fa; }
.gpDone { color: #555; }
.gpBy { color: #888; font-size: 10px; }
.gpText { cursor: text; }
.gpText:hover { background: #fff6e0; }
.gpEditBox { font-size: 14px; padding: 1px 4px; border: 1px solid #8a99a8; }
.muted { color: #888; font-style: italic; padding: 2px 0; }

.logRow { padding: 4px 0; border-bottom: 1px dotted #d8dee4; }
.logMeta { color: #555; }
.cmtAdd { display: flex; gap: 6px; margin-top: 8px; }
.cmtAdd input { flex: 1; font-size: 16px; padding: 4px 6px; border: 1px solid #8a99a8; }

/* settings modal */
.modalWrap {
  position: fixed; inset: 0; background: rgba(20,30,40,.55); z-index: 100;
  display: flex; align-items: flex-start; justify-content: center; padding: 40px 12px;
}
.modal {
  background: #f4f6f8; border: 1px solid #46586a; box-shadow: 4px 4px 12px rgba(0,0,0,.4);
  width: 100%; max-width: 440px; padding: 12px 14px;
}
.modalTitle { font-weight: 800; font-size: 13px; border-bottom: 2px solid #d94f04; padding-bottom: 4px; margin-bottom: 10px; }
.modalSection { font-weight: 700; color: #a33a00; margin: 10px 0 4px; }
.modalField { display: flex; flex-direction: column; gap: 3px; font-weight: 600; margin-bottom: 8px; }
.modalField input { font-size: 16px; padding: 5px 6px; border: 1px solid #8a99a8; }
.modalHint { color: #555; font-size: 10px; margin: 4px 0 8px; line-height: 1.4; }
.modalTest { background: #fff; border: 1px solid #c8d0d8; padding: 5px 8px; margin-bottom: 8px; word-break: break-word; }
.modalBtns { display: flex; gap: 8px; flex-wrap: wrap; }

/* mobile */
@media (max-width: 720px) {
  .app { font-size: 12px; }
  .grid th { font-size: 10px; }
  .chromeNav { display: none; }
  .chromeRight { margin-left: 0; width: 100%; justify-content: space-between; }
  .btnGrad, .btnDanger { padding: 7px 14px; }
  .btnSm { padding: 4px 10px; }
  .ribBtn { width: 88px; }
  .dtBtns button { padding: 9px 12px; }
  .gearMenu div { padding: 10px 12px; }
  .dragHandle { padding: 4px; }
}

/* WOPr row menus (status + deadline popovers) */
.menuCell { position: relative; }
.stMenu, .dlMenu { left: 4px; top: 18px; }
.stMenu div .stIcon { margin-right: 4px; }
.menuCur { background: #dce8f5; font-weight: 700; }
.dlMenu { min-width: 210px; }
.dlDateRow { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.dlDateRow input { font-size: 14px; padding: 1px 2px; border: 1px solid #8a99a8; }
.dlCell a { font-weight: 600; white-space: nowrap; }
.dlNone { color: #8a99a8; text-decoration: none; }
.dlOver { color: #c0271a; font-weight: 700; }
.dlPickRow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.dlPickRow input[type="date"] { font-size: 16px; padding: 3px 4px; border: 1px solid #8a99a8; }

/* deadline calendar */
.calNav { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.calMonthLb { min-width: 108px; text-align: center; letter-spacing: 0; }
.calWrap { background: #fff; border: 1px solid #8a99a8; margin-bottom: 14px; }
.calGrid { display: grid; grid-template-columns: repeat(7, 1fr); }
.calDow {
  background: linear-gradient(#6b7c8d, #46586a); color: #fff;
  font-size: 9px; font-weight: 700; text-align: center; padding: 3px 0;
  border-right: 1px solid #37475a;
}
.calDay {
  min-height: 54px; padding: 2px 3px; font-size: 9px;
  border-right: 1px solid #dde3e9; border-bottom: 1px solid #e6ebf0;
  overflow: hidden;
}
.calDay.out { background: #eef1f4; }
.calDay.today { background: #fdf3d7; box-shadow: inset 0 0 0 2px #d94f04; }
.calNum { color: #555; font-weight: 700; }
.calChip {
  display: block; color: #fff; border-radius: 2px; padding: 1px 3px; margin-top: 2px;
  cursor: pointer; font-size: 9px; font-weight: 700; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; text-shadow: 0 1px 1px rgba(0,0,0,.35);
}
.calChip.calOver { box-shadow: inset 0 0 0 1px #ffd7d0; text-decoration: underline; }
.cp1 { background: #c22f1e; }
.cp2 { background: #d97a12; }
.cp3 { background: #d3ac0f; }
.cp4 { background: #1f7ba8; }
.cp5 { background: #6d3d91; }
.calLegend {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  background: #eef1f4; border-top: 1px solid #b8c0c8; padding: 3px 8px; font-size: 9px; color: #444;
}
.calLegItem { display: inline-flex; align-items: center; gap: 3px; font-weight: 700; }
.calSwatch { width: 9px; height: 9px; display: inline-block; border-radius: 2px; }
.calLegNote { margin-left: auto; font-style: italic; color: #777; }

@media (max-width: 720px) {
  .calDay { min-height: 46px; }
  .calLegNote { display: none; }
  .stMenu div, .dlMenu div { padding: 9px 10px; }
}

/* owner toggle bar */
.ownerBar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.ownBtn {
  font-size: 11px; cursor: pointer; padding: 3px 16px; border-radius: 3px;
  border: 1px solid #8a99a8; background: linear-gradient(#f7f9fb, #dfe6ec);
  font-weight: 700; color: #46586a;
}
.ownBtn.ownOn {
  background: linear-gradient(#f4600c, #d94f04); color: #fff;
  border-color: #a33a00; text-shadow: 0 1px 1px rgba(0,0,0,.3);
}
.ownHint { color: #777; font-size: 10px; margin-left: auto; font-style: italic; }

/* WOPr controls bar (sits under the WOPr header) */
.woprSub { gap: 14px; }

@media (max-width: 720px) {
  .ownBtn { padding: 7px 18px; }
  .ownHint { display: none; }
}

/* household system badges + filter */
.sysBadge {
  display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .5px;
  padding: 0 4px; border: 1px solid rgba(0,0,0,.2); cursor: pointer; white-space: nowrap;
}
.sysG1 { background: #dce8f5; color: #1f4f86; border-color: #9db8d6; } /* Household Systems */
.sysG2 { background: #ddefdd; color: #1c5c34; border-color: #a4c8a4; } /* Recurring Work */
.sysG3 { background: #ead9f2; color: #5a2d78; border-color: #c3a1d6; } /* Interests/Non-Urgent */
.sysG4 { background: #e6e9ec; color: #444; border-color: #b4bcc4; }    /* Admin */
.sysNone { color: #8a99a8; font-size: 9px; text-decoration: underline dashed; white-space: nowrap; }
.sysMenu { padding: 8px; display: flex; align-items: center; gap: 6px; }
.sysMenu select { font-size: 16px; max-width: 230px; }
.sysFilter select { font-size: 16px; padding: 1px 2px; border: 1px solid #8a99a8; max-width: 180px; }

/* assignee chip on board rows */
.asgnChip {
  display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .5px;
  padding: 0 4px; border: 1px solid rgba(0,0,0,.2); cursor: pointer; white-space: nowrap;
}
.asgnChip.asgn-cole      { background: #f4d5a5; color: #6a3d05; border-color: #d1a862; }
.asgnChip.asgn-jessamine { background: #f4b8d6; color: #7a1d4a; border-color: #d18cae; }
.asgnChip.asgn-unassigned { background: #f2f2f2; color: #8a99a8; border-color: #b4bcc4; text-decoration: underline dashed; }
.dtlAssignSel { font-size: 16px; padding: 1px 2px; border: 1px solid #8a99a8; }

/* V1 version chip in header */
.verChip {
  background: #ffd75e;
  color: #5a3d00;
  font-size: 10px;
  font-weight: bold;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 6px;
  vertical-align: middle;
  border: 1px solid #c9a227;
}
.partOrderBox { margin: 4px 0 8px; }

/* ---- household lists (Shopping / Today's / Quick Capture) ---- */
.listGrid { min-width: 0; }               /* full-width tables fit the phone — no sideways scroll */
.listWrap { overflow-x: visible; }
.listGrid td { padding: 7px 6px; }        /* roomier tap targets than the dense CMMS grids */
.listSub { gap: 6px; }
.listAddInput { font-size: 16px; flex: 1 1 150px; min-width: 130px; padding: 3px 6px; border: 1px solid #8a99a8; }
.liTick { text-align: center; cursor: pointer; font-size: 13px; }
.liOpenIc { color: #8a99a8; }
.liDoneIc { color: #1c7a2d; }
.liText { cursor: pointer; font-size: 13px; }
.liStrike { text-decoration: line-through; color: #8a99a8; }   /* Shopping: crossed out like her Notes habit */
.liDim { color: #6f7b87; }                                     /* Today's/Capture: checkmark style, text readable */
.liDoneRow { background: #f4f7f4; }
.liDoneRow:hover { background: #eef3ee; }
.liDel { text-align: center; }
.liDel a { color: #a33; text-decoration: none; font-weight: 700; padding: 2px 6px; }
.mornBanner {
  background: #fff8e0; border: 1px solid #d8c26a; border-bottom: none;
  padding: 5px 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12px;
}
.listNav { display: flex; gap: 6px; flex-wrap: wrap; margin: 0 0 6px; }
.viewBtns { display: inline-flex; align-items: center; gap: 4px; margin-left: 10px; }
.viewBtns b { font-size: 11px; }
.gpDel { color: #a33; text-decoration: none; font-weight: 700; padding: 0 4px; }
.gpAdd { margin: 6px 0 2px; }
@media (max-width: 720px) {
  .listGrid td { padding: 10px 8px; }
  .listNav .btnGrad { padding: 6px 10px; }
}
